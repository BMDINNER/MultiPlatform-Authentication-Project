services:
  - type: web
    name: auth-service
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: http://localhost:3000
      - key: DATABASE_URL
        fromDatabase:
          name: auth-service-db
          property: connectionString

databases:
  - name: auth-service-db
    plan: free