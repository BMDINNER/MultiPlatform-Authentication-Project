version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpassword
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth-network

  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    environment:
      NODE_ENV: "${NODE_ENV}"
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      PORT: 3001
      CLIENT_URL: "${CLIENT_URL}"
    networks:
      - auth-network

volumes:
  postgres_data:

networks:
  auth-network:
    driver: bridge